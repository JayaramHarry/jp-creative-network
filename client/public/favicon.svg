<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0b0f19" stroke="#1f2937" stroke-width="12" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#brand-grad)" stroke-width="16" filter="url(#glow)" opacity="0.4" />
  <text x="50%" y="54%" font-family="'Outfit', 'Inter', sans-serif" font-size="200" font-weight="900" fill="url(#brand-grad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-10" filter="url(#glow)">JP</text>
</svg>